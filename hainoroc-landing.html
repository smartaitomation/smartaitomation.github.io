<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hai Noroc - Meet, Chat, Go Out</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 45%, #e94560 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .container { text-align: center; max-width: 420px; width: 100%; animation: fadeIn .4s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .app-icon {
      width: 120px; height: 120px; margin: 0 auto 24px; border-radius: 28px;
      background: #fff; color: #e94560; display: flex; align-items: center; justify-content: center;
      font-size: 48px; box-shadow: 0 12px 34px rgba(0,0,0,.35);
    }
    h1 { font-size: 34px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.4px; }
    p { font-size: 18px; opacity: .95; margin-bottom: 30px; line-height: 1.45; }
    .download-btn {
      display: inline-block; background: #fff; color: #1a1a2e; text-decoration: none;
      padding: 16px 40px; border-radius: 30px; font-weight: 700; font-size: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,.25); transition: transform .15s ease;
    }
    .download-btn:active { transform: scale(.97); }
    .note { margin-top: 18px; font-size: 13px; opacity: .82; }
    .spinner {
      width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.35); border-top-color: #fff;
      border-radius: 50%; display: inline-block; vertical-align: middle; margin-left: 8px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-icon">🍻</div>
    <h1>Hai Noroc</h1>
    <p>Find nearby gatherings, join friends, and plan your next night out.</p>

    <a href="https://apps.apple.com" class="download-btn" id="downloadBtn">Open App Store</a>
    <div class="note" id="redirectNotice">Redirecting to App Store<span class="spinner"></span></div>
  </div>

  <script>
    const APP_STORE_URL = 'https://apps.apple.com';
    setTimeout(function () { window.location.href = APP_STORE_URL; }, 2000);
    document.getElementById('downloadBtn').addEventListener('click', function (event) {
      event.preventDefault();
      window.location.href = APP_STORE_URL;
    });
  </script>
</body>
</html>
